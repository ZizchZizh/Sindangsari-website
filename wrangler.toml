name = "web-desa-sindangsari"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
routes = [{ pattern = "sindangsari.web.id/*", zone_name = "sindangsari.web.id" }]

# ─── Cloudflare D1 (konten SQLite) ───────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "web-desa-sindangsari-db"
database_id = "c578c1ca-4e96-4142-b0f0-4ceffe035ed9"

# ─── Cloudflare R2 (media binary) ────────────────────────────────────────────
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "web-desa-sindangsari-media"

# ─── Cloudflare KV (sesi TTL) ────────────────────────────────────────────────
[[kv_namespaces]]
binding = "SESSION_KV"
id = "12efcdd486e54c86a30f5db20351a1ab"

# ─── Cron triggers (dinonaktifkan) ───────────────────────────────────────────
# Backup mingguan otomatis dimatikan. Backup dilakukan manual lewat tombol
# export di panel admin (lihat docs handover). Untuk mengaktifkan lagi:
# isi crons = ["0 0 * * 0"] — butuh workers.dev subdomain akun terdaftar.
[triggers]
crons = []

# ─── Local development ────────────────────────────────────────────────────────
[dev]
port = 4321
